topic_probe:
  ros__parameters:
    image_topic: /camera/image
    camera_info_topic: /camera/camera_info
    pointcloud_topic: /livox/lidar
    imu_topic: /imu
    report_period_sec: 2.0

status_stub:
  ros__parameters:
    status_topic: /gaussian_lic/status
    publish_period_sec: 1.0

synthetic_gs_frame_pub:
  ros__parameters:
    image_topic: /image_for_gs
    camera_info_topic: /camera_info_for_gs
    depth_topic: /depth_for_gs
    pose_topic: /pose_for_gs
    pointcloud_topic: /points_for_gs
    imu_topic: /imu_for_gs
    publish_rate_hz: 10.0
    pointcloud_color_mode: packed_rgb
    point_color_rgb: "255,32,16"
    image_color_rgb: "0,0,0"
    publish_depth: true

mapping_node:
  ros__parameters:
    image_topic: /image_for_gs
    camera_info_topic: /camera_info_for_gs
    depth_topic: /depth_for_gs
    pose_topic: /pose_for_gs
    pointcloud_topic: /points_for_gs
    imu_topic: /imu_for_gs
    sync_tolerance_sec: 0.01
    max_queue_size: 10000
    sensor_qos_reliability: best_effort
    sensor_qos_history: keep_last
    sensor_qos_depth: 5
    process_period_ms: 5
    select_every_k_frame: 8
    require_depth_topic: true
    fx: 1.0
    fy: 1.0
    cx: 0.5
    cy: 0.5
    width: 1
    height: 1
    depth_completion: false
    patch_size: 10
    max_depth: 20.0
    enable_torch_camera_conversion: false
    enable_torch_gaussian_init: false
    enable_torch_gaussian_extend: true
    gaussian_init_min_points: 1
    gaussian_init_min_keyframes: 1
    sh_degree: 3
    white_background: false
    random_background: false
    convert_SHs_python: false
    compute_cov3D_python: false
    lambda_erank: 0.0
    scaling_scale: 1.0
    position_lr: 0.00016
    feature_lr: 0.005
    opacity_lr: 0.05
    scaling_lr: 0.005
    rotation_lr: 0.001
    lambda_dssim: 0.2
    optimize_depth: true
    lambda_depth: 0.005
    iteration_decay: false
    apply_exposure: false
    exposure_lr: 0.001
    skybox_points_num: 0
    skybox_radius: 1000.0
    torch_gaussian_device: cpu
    gaussian_map_chunk_size: 1024
    max_path_length: 5000
    max_map_points: 200000
    publish_rendered_preview: true
    render_mode: debug_cpu
    active_profile: default
    odometry_topic: /gaussian_lic/odometry
    path_topic: /gaussian_lic/path
    rendered_image_topic: /gaussian_lic/rendered_image
    map_points_topic: /gaussian_lic/map_points
    gaussian_map_topic: /gaussian_lic/gaussian_map
    save_map_service: /gaussian_lic/save_map
    status_topic: /gaussian_lic/status
    world_frame: map
    publish_tf: false
    body_frame: base_link
    camera_frame: camera
    lidar_frame: lidar
    imu_frame: imu
