name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: build-${{ matrix.ros_distro }}
    runs-on: ubuntu-latest
    container: ros:${{ matrix.ros_distro }}-ros-base
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [jazzy, humble]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libeigen3-dev \
            libopencv-dev \
            python3-colcon-common-extensions \
            python3-yaml \
            ripgrep \
            ros-${ROS_DISTRO}-cv-bridge \
            ros-${ROS_DISTRO}-rclcpp-components \
            ros-${ROS_DISTRO}-rosbag2-py \
            ros-${ROS_DISTRO}-sensor-msgs-py \
            ros-${ROS_DISTRO}-tf2-ros

      - name: Static checks
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          bash -n scripts/*.sh
          /usr/bin/python3 -m py_compile \
            scripts/check_profiles.py \
            scripts/convert_ros1_bag_to_rosbag2.py \
            scripts/perf_regression.py \
            src/gaussian_lic_bringup/launch/run_bag.launch.py \
            src/gaussian_lic_tools/gaussian_lic_tools/*.py
          ./scripts/check_profiles.py

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --event-handlers console_direct+
