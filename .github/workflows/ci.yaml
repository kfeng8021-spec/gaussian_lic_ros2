name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  artifact-gates:
    name: artifact-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Static checks
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/*.sh
          /usr/bin/python3 -m py_compile scripts/*.py
          ./scripts/check_profiles.py

      - name: Artifact comparison gates
        shell: bash
        run: |
          set -euo pipefail
          export GAUSSIAN_LIC_ARTIFACT_DIR=artifact_reports
          ./scripts/verify_artifact_gates.sh

      - name: Upload artifact gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-gate-reports
          path: artifact_reports
          if-no-files-found: error

  build:
    name: build-${{ matrix.ros_distro }}
    runs-on: ubuntu-latest
    container: ros:${{ matrix.ros_distro }}-ros-base
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [jazzy, humble]
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libeigen3-dev \
            libopencv-dev \
            python3-colcon-common-extensions \
            python3-yaml \
            ripgrep \
            ros-${ROS_DISTRO}-cv-bridge \
            ros-${ROS_DISTRO}-rclcpp-components \
            ros-${ROS_DISTRO}-ros2bag \
            ros-${ROS_DISTRO}-rosbag2-py \
            ros-${ROS_DISTRO}-rosbag2-storage-mcap \
            ros-${ROS_DISTRO}-rosbag2-transport \
            ros-${ROS_DISTRO}-sensor-msgs-py \
            ros-${ROS_DISTRO}-tf2-ros

      - name: Static checks
        shell: bash
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/${ROS_DISTRO}/setup.bash
          set -u
          bash -n scripts/*.sh
          /usr/bin/python3 -m py_compile \
            scripts/*.py \
            src/gaussian_lic_bringup/launch/run_bag.launch.py \
            src/gaussian_lic_tools/gaussian_lic_tools/*.py
          ./scripts/check_profiles.py

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/${ROS_DISTRO}/setup.bash
          set -u
          colcon build --event-handlers console_direct+

      - name: Jazzy synthetic replay smoke
        if: matrix.ros_distro == 'jazzy'
        shell: bash
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          set -u
          ./scripts/ci_replay_smoke.sh \
            --bag bags/ci_synthetic_gs_demo \
            --artifact-dir ci_replay_artifacts \
            --duration 4 \
            --timeout 20

      - name: Upload Jazzy replay artifacts
        if: always() && matrix.ros_distro == 'jazzy'
        uses: actions/upload-artifact@v4
        with:
          name: jazzy-replay-artifacts
          path: ci_replay_artifacts
          if-no-files-found: ignore

      - name: Upload Jazzy smoke logs
        if: always() && matrix.ros_distro == 'jazzy'
        uses: actions/upload-artifact@v4
        with:
          name: jazzy-smoke-logs
          path: log/*.log
          if-no-files-found: ignore
